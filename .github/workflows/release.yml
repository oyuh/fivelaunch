name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Frontend tests
        run: bun run test

      # Rust's build script embeds/validates frontendDist — build it first.
      - name: Build frontend
        run: bun run build

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      # Signs the NSIS setup for the updater. createUpdaterArtifacts (tauri.conf.json)
      # emits a *-setup.exe.sig next to the installer.
      - name: Package Windows (tauri build)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build

      # Rename the installer to a stable URL and build the updater manifest.
      - name: Stage release assets + updater manifest
        run: |
          New-Item -ItemType Directory -Force release-dist | Out-Null

          $setup = Get-ChildItem src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          if (-not $setup) { throw "NSIS setup not found" }
          Copy-Item $setup.FullName release-dist/FiveLaunch-Setup.exe

          $sigFile = "$($setup.FullName).sig"
          if (-not (Test-Path $sigFile)) {
            throw "Updater signature (.sig) missing - is the TAURI_SIGNING_PRIVATE_KEY secret set?"
          }
          $signature = (Get-Content $sigFile -Raw).Trim()

          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $url = "https://github.com/oyuh/fivelaunch/releases/download/$tag/FiveLaunch-Setup.exe"

          $manifest = [ordered]@{
            version   = $version
            notes     = "FiveLaunch $version. See the release page for what's new."
            pub_date  = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{ signature = $signature; url = $url }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content release-dist/latest.json -Encoding utf8

          Get-ChildItem release-dist | Format-Table -AutoSize
          Get-Content release-dist/latest.json

      # Ship only the signed setup + the manifest (no portable build).
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = @("release-dist/FiveLaunch-Setup.exe", "release-dist/latest.json")

          gh release view $tag | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release already exists: $tag (uploading assets)"
            gh release upload $tag @assets --clobber
          } else {
            Write-Host "Creating release: $tag"
            gh release create $tag @assets --title $tag --generate-notes
          }

      # Tell the docs site (oyuh/fivelaunch-docs) to regenerate + redeploy.
      # Needs a repo-scoped PAT stored as the DOCS_DISPATCH_TOKEN secret; if it's
      # absent this step no-ops so it never blocks a release.
      - name: Notify docs site
        env:
          DOCS_TOKEN: ${{ secrets.DOCS_DISPATCH_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DOCS_TOKEN)) {
            Write-Host "DOCS_DISPATCH_TOKEN not set; skipping docs dispatch."
            exit 0
          }
          $tag = "${{ github.ref_name }}"
          $body = @{ event_type = "fivelaunch-released"; client_payload = @{ tag = $tag } } | ConvertTo-Json
          Invoke-RestMethod -Method Post `
            -Uri "https://api.github.com/repos/oyuh/fivelaunch-docs/dispatches" `
            -Headers @{
              Authorization = "Bearer $env:DOCS_TOKEN"
              Accept        = "application/vnd.github+json"
              "User-Agent"  = "fivelaunch-release"
            } `
            -Body $body
          Write-Host "Dispatched fivelaunch-released to docs."
