name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Resolve pnpm store path
        run: |
          "STORE_PATH=$(pnpm store path --silent)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Frontend tests
        run: pnpm test

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Package Windows (tauri build)
        run: pnpm tauri build

      - name: Stage release assets
        run: |
          New-Item -ItemType Directory -Force release-dist | Out-Null
          Copy-Item src-tauri/target/release/fivelaunch.exe release-dist/FiveLaunch.exe
          Copy-Item src-tauri/target/release/fivelaunch.exe release-dist/FiveLaunch-Portable.exe
          Compress-Archive -Path release-dist/FiveLaunch.exe -DestinationPath release-dist/FiveLaunch-windows.zip -Force
          $setup = Get-ChildItem src-tauri/target/release/bundle/nsis/*-setup.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($setup) { Copy-Item $setup.FullName release-dist/FiveLaunch-Setup.exe }
          Get-ChildItem release-dist | Format-Table -AutoSize

      - name: Publish release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = @(
            "release-dist/FiveLaunch-Portable.exe",
            "release-dist/FiveLaunch-windows.zip"
          )
          if (Test-Path release-dist/FiveLaunch-Setup.exe) {
            $assets += "release-dist/FiveLaunch-Setup.exe"
          }

          gh release view $tag | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release already exists: $tag (uploading assets)"
            gh release upload $tag @assets --clobber
          } else {
            Write-Host "Creating release: $tag"
            gh release create $tag @assets --title $tag --generate-notes
          }
